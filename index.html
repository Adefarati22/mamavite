<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
     <!-- preconnect to external domain -->
    <link rel="dns-prefetch" href="https://fonts.cdnfonts.com" />
    <!-- preconnect with crossorigin -->
    <link
      rel="preconnect"
      href="https://fonts.cdnfonts.com"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.cdnfonts.com/css/prosto-sans"
      media="print"
      onload="this.media='all'"
    />
    <!-- preload critical resources -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.cdnfonts.com/css/prosto-sans"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#ffffff" />
 <meta
      name="description"
      content="Mamavite - A food that every child loves and a food that every parent trusts. Mamavite is a trusted brand that has been providing quality food products for children for many years."
    />
    <meta name="keywords" content="Mamavite, Tom Brown, baby cereal, Nigerian food, infant nutrition, natural cereal" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="/" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mamavite — Nutritious, Natural Nigerian Cereals" />
    <meta property="og:description" content="Mamavite Tombrown Cereals — natural, nutrient-dense cereals crafted for babies and families. Order online and get fast delivery across Nigeria." />
    <meta property="og:image" content="/src/assets/hero.png" />
    <meta property="og:url" content="/" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mamavite — Nutritious, Natural Nigerian Cereals" />
    <meta name="twitter:description" content="Natural, nutrient-dense cereals crafted for babies and families. Order online and get fast delivery across Nigeria." />
    <meta name="twitter:image" content="/src/assets/hero.png" />
    <!-- ios specific devices -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- preload critical css -->
    <link
      rel="preload"
      href="/src/index.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
        <!-- fallback for browsers if they disable javascript -->
    <noscript><link rel="stylesheet" href="/src/index.css" /></noscript>
    <title>Mamavite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
